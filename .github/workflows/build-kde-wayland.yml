name: 构建并更新 KDE Wayland 预编译包(anland)

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: '选择要更新的预编译包版本'
        required: true
        type: choice
        default: 'ubuntu2604'
        options:
          - 'ubuntu2604'
          - 'Debian13'
          - 'Fedora43'
          - 'Arch'
      anland_ref:
        description: 'anland 仓库分支、标签或 commit'
        required: true
        type: string
        default: 'main'
      commit_changes:
        description: '构建成功后提交更新到本仓库'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: build-kde-wayland-${{ github.ref }}-${{ github.event.inputs.build_target }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ github.event.inputs.build_target }}
    runs-on: ubuntu-24.04-arm

    env:
      ANLAND_REPO: https://github.com/superturtlee/anland.git
      ANLAND_REF: ${{ github.event.inputs.anland_ref }}
      BUILD_TARGET: ${{ github.event.inputs.build_target }}

    steps:
      - name: 检出本仓库
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 解析构建目标
        id: target
        run: |
          set -euo pipefail

          case "$BUILD_TARGET" in
            ubuntu2604)
              echo "image=ubuntu:26.04" >> "$GITHUB_OUTPUT"
              echo "script=producers/kde/ubuntu2604_v3/build.sh" >> "$GITHUB_OUTPUT"
              echo "dest=anland-debbuild/ubuntu2604" >> "$GITHUB_OUTPUT"
              echo "pkg_pattern=*.deb" >> "$GITHUB_OUTPUT"
              ;;
            Debian13)
              echo "image=debian:trixie" >> "$GITHUB_OUTPUT"
              echo "script=producers/kde/Debian13_v2/build.sh" >> "$GITHUB_OUTPUT"
              echo "dest=anland-debbuild/Debian13" >> "$GITHUB_OUTPUT"
              echo "pkg_pattern=*.deb" >> "$GITHUB_OUTPUT"
              ;;
            Fedora43)
              echo "image=fedora:43" >> "$GITHUB_OUTPUT"
              echo "script=producers/kde/Fedora43_v3/build.sh" >> "$GITHUB_OUTPUT"
              echo "dest=anland-rpmbuild/Fedora43" >> "$GITHUB_OUTPUT"
              echo "pkg_pattern=*.rpm" >> "$GITHUB_OUTPUT"
              ;;
            Arch)
              echo "image=archlinux:latest" >> "$GITHUB_OUTPUT"
              echo "script=producers/kde/Arch_v3/build.sh" >> "$GITHUB_OUTPUT"
              echo "dest=anland-pkgbuild/Arch" >> "$GITHUB_OUTPUT"
              echo "pkg_pattern=*.pkg.tar.zst" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "不支持的构建目标: $BUILD_TARGET" >&2
              exit 1
              ;;
          esac

      - name: 在对应发行版中编译包
        env:
          DISTRO_IMAGE: ${{ steps.target.outputs.image }}
          BUILD_SCRIPT: ${{ steps.target.outputs.script }}
          PKG_PATTERN: ${{ steps.target.outputs.pkg_pattern }}
          OUTPUT_DIR: .anland-build/${{ github.event.inputs.build_target }}
        run: |
          set -euo pipefail

          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          docker run --rm \
            -e ANLAND_REPO \
            -e ANLAND_REF \
            -e BUILD_SCRIPT \
            -e BUILD_TARGET \
            -e PKG_PATTERN \
            -v "$PWD/$OUTPUT_DIR:/root/anland-build" \
            "$DISTRO_IMAGE" \
            bash -lc '
              set -euo pipefail

              # 按发行版安装基础工具
              case "$BUILD_TARGET" in
                Debian13|ubuntu2604)
                  apt-get update
                  apt-get install -y --no-install-recommends \
                    git ca-certificates sudo \
                    build-essential devscripts dpkg-dev fakeroot patch
                  ;;
                Fedora43)
                  dnf install -y --setopt=install_weak_deps=False \
                    git ca-certificates sudo \
                    dnf-plugins-core rpmdevtools rpm-build patch tar xz
                  ;;
                Arch)
                  pacman -Sy --noconfirm archlinux-keyring glibc
                  pacman -Su --noconfirm
                  pacman -S --noconfirm --needed git ca-certificates sudo base-devel patch tar
                  useradd -m builder 2>/dev/null || true
                  echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
                  chmod 0440 /etc/sudoers.d/builder
                  ;;
              esac

              if ! git clone --depth=1 --branch "$ANLAND_REF" "$ANLAND_REPO" /tmp/anland; then
                git clone --depth=1 "$ANLAND_REPO" /tmp/anland
                git -C /tmp/anland fetch --depth=1 origin "$ANLAND_REF"
                git -C /tmp/anland checkout --detach FETCH_HEAD
              fi

              # Debian 13 (Trixie) 使用 DEB822 格式的 .sources 文件，
              # build.sh 自带的 deb-src 启用逻辑不兼容此格式，需手动修复
              if [ "$BUILD_TARGET" = "Debian13" ]; then
                if [ -f /etc/apt/sources.list.d/debian.sources ]; then
                  sed -i "s/^Types: deb\$/Types: deb deb-src/" /etc/apt/sources.list.d/debian.sources
                fi
                apt-get update
              fi

              test -f "/tmp/anland/$BUILD_SCRIPT"
              chmod +x "/tmp/anland/$BUILD_SCRIPT"

              cd "/tmp/anland/$(dirname "$BUILD_SCRIPT")"

              # Arch 的 makepkg 不允许 root 运行，需切到 builder 用户
              if [ "$BUILD_TARGET" = "Arch" ]; then
                chmod 777 /root/anland-build
                WORKDIR=/root/anland-build sudo -u builder \
                  SCRIPT_DIR="$(pwd)" \
                  /bin/bash "./$(basename "$BUILD_SCRIPT")"
              else
                WORKDIR=/root/anland-build sudo -E "./$(basename "$BUILD_SCRIPT")"
              fi
            '

      - name: 更新本仓库预编译包目录
        env:
          DEST_DIR: ${{ steps.target.outputs.dest }}
          PKG_PATTERN: ${{ steps.target.outputs.pkg_pattern }}
          OUTPUT_DIR: .anland-build/${{ github.event.inputs.build_target }}
        run: |
          set -euo pipefail

          rm -rf "$DEST_DIR/kwin" "$DEST_DIR/xwayland"
          mkdir -p "$DEST_DIR/kwin" "$DEST_DIR/xwayland"

          # 按包格式收集产物
          find "$OUTPUT_DIR/kwin" -maxdepth 1 -type f -name "$PKG_PATTERN" ! -name '*debug*' ! -name '*dbgsym*' -exec cp -v {} "$DEST_DIR/kwin/" \;
          find "$OUTPUT_DIR/xwayland" -maxdepth 1 -type f -name "$PKG_PATTERN" ! -name '*debug*' ! -name '*dbgsym*' -exec cp -v {} "$DEST_DIR/xwayland/" \;

          # Arch 的 xwayland 包名是 xorg-xwayland，产物目录可能不同
          if [ -d "$OUTPUT_DIR/xorg-xwayland" ]; then
            find "$OUTPUT_DIR/xorg-xwayland" -maxdepth 1 -type f -name "$PKG_PATTERN" -exec cp -v {} "$DEST_DIR/xwayland/" \;
          fi

          pkg_count="$(find "$DEST_DIR" -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.pkg.tar.zst' \) | wc -l)"
          if [ "$pkg_count" -eq 0 ]; then
            echo "没有找到生成的包" >&2
            exit 1
          fi

          find "$DEST_DIR" -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.pkg.tar.zst' \) -print | sort

      - name: 上传构建产物
        uses: actions/upload-artifact@v6
        with:
          name: anland-pkgs-${{ github.event.inputs.build_target }}
          path: |
            ${{ steps.target.outputs.dest }}/kwin/*.deb
            ${{ steps.target.outputs.dest }}/kwin/*.rpm
            ${{ steps.target.outputs.dest }}/kwin/*.pkg.tar.zst
            ${{ steps.target.outputs.dest }}/xwayland/*.deb
            ${{ steps.target.outputs.dest }}/xwayland/*.rpm
            ${{ steps.target.outputs.dest }}/xwayland/*.pkg.tar.zst
          if-no-files-found: error

      - name: 提交更新
        if: ${{ github.event.inputs.commit_changes == 'true' }}
        env:
          DEST_DIR: ${{ steps.target.outputs.dest }}
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain -- "$DEST_DIR")" ]; then
            echo "预编译包没有变化，无需提交"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A "$DEST_DIR"
          git commit -m "Update anland KDE Wayland packages ($BUILD_TARGET)"
          git push
